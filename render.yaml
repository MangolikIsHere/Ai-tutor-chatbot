services:
  - type: web
    name: ml-rag-chatbot
    runtime: python
    rootDir: chatbot-rag-backend

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: uvicorn rag_chatbot:app --host 0.0.0.0 --port $PORT --workers 1

    healthCheckPath: /healthz

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ENABLE_RAG
        value: "true"
      - key: RAG_PREWARM_ON_STARTUP
        value: "false"
      - key: EMBEDDING_BACKEND
        value: huggingface
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: LLM_REQUEST_TIMEOUT_SECONDS
        value: "45"
      - key: HF_HOME
        value: /opt/render/project/.cache/hf
